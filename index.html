<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>War Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Courier New', monospace; }
  #gameCanvas { border: 3px solid #555; display: block; }
  #ui {
    width: 900px;
    background: #222;
    border: 3px solid #555;
    border-top: none;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #ui button {
    background: #3a5a3a;
    color: #cfc;
    border: 2px solid #5a8a5a;
    padding: 6px 14px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    cursor: pointer;
    border-radius: 4px;
  }
  #ui button:hover { background: #4a7a4a; }
  #ui button:disabled { background: #333; color: #666; border-color: #444; cursor: default; }
  #supplies { color: #ffd700; font-size: 14px; font-weight: bold; margin-right: auto; }
</style>
</head>
<body>

<canvas id="gameCanvas" width="900" height="580"></canvas>
<div id="ui">
  <span id="supplies">⚡ Supplies: 200</span>
  <button id="btnSoldier" onclick="deployUnit('soldier')">🪖 Soldier ($50)</button>
  <button id="btnJeep"    onclick="deployUnit('jeep')">🚙 Jeep ($100)</button>
  <button id="btnTank"    onclick="deployUnit('tank')">🪖 Tank ($200)</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ─── GAME STATE ───────────────────────────────────────────────────────────────
const state = {
  supplies: 200,
  playerUnits: [],
  enemyUnits: [],
  bullets: [],
  particles: [],
  gameOver: false,
  winner: null,
  lastTime: 0,
  supplyTimer: 0,
  aiTimer: 0,
};

const HQ = {
  player: { x: 60, y: H/2, w: 80, h: 100, hp: 500, maxHp: 500, color: '#2255aa' },
  enemy:  { x: W - 140, y: H/2, w: 80, h: 100, hp: 500, maxHp: 500, color: '#aa2222' },
};

// ─── UNIT DEFINITIONS ─────────────────────────────────────────────────────────
const UNIT_DEFS = {
  soldier: { cost: 50,  hp: 40,  speed: 60,  range: 80,  damage: 8,  fireRate: 1.2, radius: 10, color: '#4488ff', eColor: '#ff4444' },
  jeep:    { cost: 100, hp: 80,  speed: 110, range: 120, damage: 15, fireRate: 0.9, radius: 14, color: '#3399ff', eColor: '#ff6633' },
  tank:    { cost: 200, hp: 200, speed: 35,  range: 170, damage: 40, fireRate: 0.5, radius: 18, color: '#1155cc', eColor: '#cc1111' },
};

// ─── MAP DRAWING ──────────────────────────────────────────────────────────────
function drawMap() {
  // Sky/ground gradient
  const ground = ctx.createLinearGradient(0, 0, W, 0);
  ground.addColorStop(0,    '#2a3d1a');
  ground.addColorStop(0.35, '#3a5228');
  ground.addColorStop(0.65, '#3a5228');
  ground.addColorStop(1,    '#3d1a1a');
  ctx.fillStyle = ground;
  ctx.fillRect(0, 0, W, H);

  // Dirt road (horizontal center lane)
  ctx.fillStyle = '#7a6040';
  ctx.fillRect(0, H/2 - 40, W, 80);
  ctx.strokeStyle = '#a08050';
  ctx.setLineDash([30, 20]);
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, H/2);
  ctx.lineTo(W, H/2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Decorative trees top
  drawTrees([140,40], [260,25], [400,55], [540,30], [660,45], [760,35]);
  // Decorative trees bottom
  drawTrees([160,H-50], [300,H-35], [450,H-60], [590,H-40], [720,H-50]);

  // Rocks
  drawRocks([200,180], [350,420], [550,160], [700,380]);
}

function drawTrees(coords) {
  // called as drawTrees([x,y], [x,y]...)
  for (const [x,y] of arguments) {
    ctx.fillStyle = '#1a3a10';
    ctx.beginPath();
    ctx.moveTo(x, y - 22);
    ctx.lineTo(x - 14, y + 8);
    ctx.lineTo(x + 14, y + 8);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x, y - 36);
    ctx.lineTo(x - 10, y - 8);
    ctx.lineTo(x + 10, y - 8);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#5a3a20';
    ctx.fillRect(x - 4, y + 8, 8, 14);
  }
}

function drawRocks(coords) {
  for (const [x,y] of arguments) {
    ctx.fillStyle = '#556655';
    ctx.beginPath();
    ctx.ellipse(x, y, 18, 11, 0.3, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#667766';
    ctx.beginPath();
    ctx.ellipse(x-5, y-4, 10, 6, -0.2, 0, Math.PI*2);
    ctx.fill();
  }
}

// ─── HQ DRAWING ───────────────────────────────────────────────────────────────
function drawHQ(hq, label) {
  const { x, y, w, h, hp, maxHp, color } = hq;
  const cx = x + w/2, top = y - h/2;

  // Base fortress
  ctx.fillStyle = color;
  ctx.fillRect(x, top, w, h);

  // Battlements (top notches)
  ctx.fillStyle = color;
  const notchW = 12, notchH = 10, gap = 8;
  for (let nx = x + 4; nx < x + w - notchW; nx += notchW + gap) {
    ctx.fillRect(nx, top - notchH, notchW, notchH);
  }

  // Outline
  ctx.strokeStyle = '#ffffff44';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, top, w, h);

  // Flag pole + flag
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx, top - 10);
  ctx.lineTo(cx, top - 40);
  ctx.stroke();
  ctx.fillStyle = label === 'ALLIED' ? '#4488ff' : '#ff4444';
  ctx.beginPath();
  ctx.moveTo(cx, top - 40);
  ctx.lineTo(cx + 20, top - 33);
  ctx.lineTo(cx, top - 26);
  ctx.closePath();
  ctx.fill();

  // Label
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(label, cx, top - 48);

  // Health bar background
  const barW = w + 20, barH = 10;
  const barX = x - 10, barY = top - 62;
  ctx.fillStyle = '#333';
  ctx.fillRect(barX, barY, barW, barH);

  // Health bar fill
  const pct = Math.max(0, hp / maxHp);
  const barColor = pct > 0.5 ? '#44cc44' : pct > 0.25 ? '#ccaa22' : '#cc3322';
  ctx.fillStyle = barColor;
  ctx.fillRect(barX, barY, barW * pct, barH);

  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, barH);

  // HP text
  ctx.fillStyle = '#eee';
  ctx.font = '10px Courier New';
  ctx.fillText(`${Math.ceil(hp)} / ${maxHp}`, cx, barY - 2);
}

// ─── UNIT DRAWING ─────────────────────────────────────────────────────────────
function drawUnit(u) {
  const { x, y, type, color, selected, hp, maxHp, radius } = u;
  const def = UNIT_DEFS[type];

  // Selection ring
  if (selected) {
    ctx.strokeStyle = '#ffff00';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    ctx.arc(x, y, radius + 4, 0, Math.PI*2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  if (type === 'soldier') {
    // Body
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y+2, radius - 2, 0, Math.PI*2);
    ctx.fill();
    // Helmet
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y - 4, 7, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = '#88aaff';
    ctx.fillRect(x-7, y-5, 14, 3);
  } else if (type === 'jeep') {
    // Body
    ctx.fillStyle = color;
    ctx.fillRect(x - radius, y - radius/2, radius*2, radius);
    // Wheels
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(x - radius + 5, y + radius/2, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + radius - 5, y + radius/2, 5, 0, Math.PI*2); ctx.fill();
    // Windshield
    ctx.fillStyle = '#aaddff88';
    ctx.fillRect(x - 6, y - radius/2 - 4, 12, 6);
  } else if (type === 'tank') {
    // Treads
    ctx.fillStyle = '#333';
    ctx.fillRect(x - radius, y - radius + 4, radius*2, 8);
    ctx.fillRect(x - radius, y + radius - 12, radius*2, 8);
    // Hull
    ctx.fillStyle = color;
    ctx.fillRect(x - radius + 4, y - radius + 6, (radius-4)*2, (radius-6)*2);
    // Turret
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, 9, 0, Math.PI*2);
    ctx.fill();
    // Barrel (pointing right for player, left for enemy)
    const dir = color === def.color ? 1 : -1;
    ctx.strokeStyle = '#aaa';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + dir * 18, y);
    ctx.stroke();
  }

  // Outline
  ctx.strokeStyle = '#ffffff55';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI*2);
  ctx.stroke();

  // Health bar
  const bw = radius * 2.2;
  ctx.fillStyle = '#333';
  ctx.fillRect(x - bw/2, y - radius - 10, bw, 5);
  ctx.fillStyle = hp/maxHp > 0.5 ? '#44cc44' : '#cc4422';
  ctx.fillRect(x - bw/2, y - radius - 10, bw * (hp/maxHp), 5);
}

// ─── MAIN DRAW ────────────────────────────────────────────────────────────────
function draw() {
  drawMap();
  drawHQ(HQ.player, 'ALLIED');
  drawHQ(HQ.enemy,  'ENEMY');

  for (const u of [...state.playerUnits, ...state.enemyUnits]) drawUnit(u);
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min((ts - state.lastTime) / 1000, 0.05);
  state.lastTime = ts;

  draw();

  requestAnimationFrame(loop);
}

requestAnimationFrame((ts) => { state.lastTime = ts; requestAnimationFrame(loop); });

// ─── DEPLOY (placeholder for step 3) ─────────────────────────────────────────
function deployUnit(type) {
  const def = UNIT_DEFS[type];
  if (state.supplies < def.cost) return;
  state.supplies -= def.cost;
  document.getElementById('supplies').textContent = `⚡ Supplies: ${state.supplies}`;

  const spawnX = HQ.player.x + HQ.player.w + 10;
  const spawnY = HQ.player.y + HQ.player.h/2 - 20 + Math.random() * 40;
  state.playerUnits.push({
    x: spawnX, y: spawnY,
    type, hp: def.hp, maxHp: def.hp,
    speed: def.speed, range: def.range,
    damage: def.damage, fireRate: def.fireRate,
    radius: def.radius, color: def.color,
    selected: false, fireTimer: 0,
    target: null, dest: null, team: 'player',
  });
  updateButtons();
}

function updateButtons() {
  document.getElementById('btnSoldier').disabled = state.supplies < 50;
  document.getElementById('btnJeep').disabled    = state.supplies < 100;
  document.getElementById('btnTank').disabled    = state.supplies < 200;
}
</script>
</body>
</html>
